<!--
  =============================================================================
  Memory Manager — UI
  =============================================================================

  PURPOSE:
    View, edit, and delete Claude Code's local memory files and Mem0 cloud memories.

  HOW TO USE:
    Start the server:  node mcp-manager-server.js
    Open http://localhost:3456/memory in your browser.

  CLAUDE MEMORIES:
    Stored in ~/.claude/projects/<project>/memory/*.md
    Each file has YAML frontmatter (name, description, type) and markdown body.

  MEM0 MEMORIES:
    Fetched from Mem0 cloud API using the MEM0_API_KEY in .claude.json.

  IF .claude.json PATH CHANGES:
    Edit CLAUDE_JSON_PATH in mcp-manager-server.js.
  =============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-hover: #7c6ef7;
    --green: #00b894;
    --green-dim: #1a3a32;
    --red: #e74c3c;
    --red-dim: #3a1a1a;
    --orange: #f39c12;
    --blue: #5ba0d0;
    --blue-dim: #1a2535;
    --purple: #a855f7;
    --purple-dim: #2a1a3a;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .nav-links { display: flex; gap: 12px; align-items: center; }
  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .nav-links a:hover { color: var(--text); background: var(--surface2); }
  .nav-links a.active { color: var(--accent); border-color: var(--accent); }

  .tabs-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
  }
  .tab-btn {
    padding: 12px 24px;
    border: none;
    background: none;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 14px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stat { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  .stat .num { font-size: 20px; font-weight: 700; color: var(--text); }

  .toolbar {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px 9px 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap::before { content: "\1F50D"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-save { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-danger { background: var(--red); border-color: var(--red); color: #fff; }

  .filter-btns { display: flex; gap: 4px; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn:hover:not(.active) { background: var(--surface2); }

  .main { padding: 0 32px 32px; }

  /* Project group */
  .project-group { margin-bottom: 24px; }
  .project-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    cursor: pointer;
    user-select: none;
  }
  .project-header:hover .project-path { color: var(--accent); }
  .project-arrow { transition: transform 0.2s; font-size: 12px; color: var(--text-dim); }
  .project-arrow.open { transform: rotate(90deg); }
  .project-path { font-size: 14px; font-weight: 600; transition: color 0.15s; }
  .project-count {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .project-cards { display: none; }
  .project-cards.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; }

  /* Memory card */
  .mem-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.15s;
  }
  .mem-card:hover { border-color: var(--accent); }
  .mem-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .mem-card-name { font-size: 14px; font-weight: 600; }
  .mem-card-file { font-size: 11px; color: var(--text-dim); font-family: 'Cascadia Code', monospace; margin-bottom: 6px; }

  .type-badge {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .type-user { background: var(--blue-dim); color: var(--blue); }
  .type-feedback { background: var(--green-dim); color: var(--green); }
  .type-project { background: var(--purple-dim); color: var(--purple); }
  .type-reference { background: #2a2a1a; color: var(--orange); }
  .type-index { background: var(--surface2); color: var(--text-dim); }
  .type-unknown { background: var(--surface2); color: var(--text-dim); }

  .mem-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .mem-body-preview {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    max-height: 80px;
    overflow: hidden;
    font-family: 'Cascadia Code', monospace;
    white-space: pre-wrap;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .mem-actions {
    display: flex;
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .mem-actions .btn { flex: 1; justify-content: center; font-size: 12px; padding: 6px 10px; }

  /* Mem0 section */
  .mem0-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .mem0-card:hover { border-color: var(--purple); }
  .mem0-text { font-size: 13px; line-height: 1.5; margin-bottom: 8px; }
  .mem0-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 16px; flex-wrap: wrap; }
  .mem0-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 650px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
  }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    outline: none;
    resize: vertical;
    min-height: 200px;
    line-height: 1.5;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.error { background: var(--red); }
  .toast.show { opacity: 1; transform: translateY(0); }

  .loading-msg { text-align: center; color: var(--text-dim); padding: 40px; }

  @media (max-width: 600px) {
    .header, .stats-bar, .toolbar, .main { padding-left: 16px; padding-right: 16px; }
    .project-cards.open, .mem0-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>&#129504; Memory Manager</h1>
  <div class="nav-links"></div>
</div>
<div class="nav-bar" id="mainNav"></div>
<script src="/nav.js"></script>
<script>renderNav('memory')</script>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('claude', this)">Claude Local Memories</button>
  <button class="tab-btn" onclick="switchTab('mem0', this)">Mem0 Cloud Memories</button>
</div>

<div class="stats-bar">
  <div class="stat"><span class="num" id="totalProjects">0</span> Projects</div>
  <div class="stat"><span class="num" id="totalMemories">0</span> Memories</div>
  <div class="stat" id="mem0Stat" style="display:none;"><span class="num" id="totalMem0">0</span> Mem0</div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input class="search-box" id="searchBox" type="text" placeholder="Search memories..." oninput="renderCurrent()">
  </div>
  <div class="filter-btns" id="typeFilters">
    <button class="filter-btn active" onclick="setTypeFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setTypeFilter('user', this)">User</button>
    <button class="filter-btn" onclick="setTypeFilter('feedback', this)">Feedback</button>
    <button class="filter-btn" onclick="setTypeFilter('project', this)">Project</button>
    <button class="filter-btn" onclick="setTypeFilter('reference', this)">Reference</button>
  </div>
  <button class="btn" onclick="expandAll()">Expand All</button>
</div>

<div class="main">
  <div id="claudeTab"><div class="loading-msg">Loading...</div></div>
  <div id="mem0Tab" style="display:none;"><div class="loading-msg">Click the Mem0 tab to load...</div></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editTitle">Edit Memory</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="eName">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="eType">
        <option value="user">user</option>
        <option value="feedback">feedback</option>
        <option value="project">project</option>
        <option value="reference">reference</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="eDesc">
    </div>
    <div class="form-group">
      <label>Content (Markdown)</label>
      <textarea class="cm-editor" id="eBody"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveMemory()">Save</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="width:400px; text-align:center;">
    <h2>Delete Memory</h2>
    <p style="color:var(--text-dim); margin-bottom:20px;">Delete <strong id="delName"></strong>?</p>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3456';
let allProjects = [];
let mem0Data = [];
let currentTab = 'claude';
let typeFilter = 'all';
let editingMemory = null;
let deletingMemory = null;
let mem0Loaded = false;

function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// --- Tabs ---
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('claudeTab').style.display = tab === 'claude' ? 'block' : 'none';
  document.getElementById('mem0Tab').style.display = tab === 'mem0' ? 'block' : 'none';
  document.getElementById('typeFilters').style.display = tab === 'claude' ? 'flex' : 'none';
  document.getElementById('mem0Stat').style.display = tab === 'mem0' ? 'flex' : 'none';

  if (tab === 'mem0' && !mem0Loaded) loadMem0();
}

// --- Claude Memories ---
async function loadClaudeMemories() {
  try {
    const resp = await fetch(API + '/api/memories');
    allProjects = await resp.json();
    updateClaudeStats();
    renderClaude();
    toast('Loaded ' + allProjects.length + ' projects');
  } catch (e) {
    document.getElementById('claudeTab').innerHTML = '<div class="loading-msg">Failed to load. Is the server running?</div>';
  }
}

function updateClaudeStats() {
  document.getElementById('totalProjects').textContent = allProjects.length;
  const total = allProjects.reduce((sum, p) => sum + p.memories.filter(m => !m.isIndex).length, 0);
  document.getElementById('totalMemories').textContent = total;
}

function renderCurrent() {
  if (currentTab === 'claude') renderClaude();
  else renderMem0();
}

let typeFilterEl = null;
function setTypeFilter(f, btn) {
  typeFilter = f;
  document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderClaude();
}

function renderClaude() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const container = document.getElementById('claudeTab');
  let html = '';

  for (const proj of allProjects) {
    let memories = proj.memories.filter(m => !m.isIndex);

    if (search) {
      memories = memories.filter(m =>
        m.name.toLowerCase().includes(search) ||
        m.description.toLowerCase().includes(search) ||
        m.body.toLowerCase().includes(search)
      );
    }
    if (typeFilter !== 'all') {
      memories = memories.filter(m => m.type === typeFilter);
    }
    if (memories.length === 0) continue;

    html += `
      <div class="project-group">
        <div class="project-header" onclick="toggleProject(this)">
          <span class="project-arrow">&#9654;</span>
          <span class="project-path">${esc(proj.projectPath)}</span>
          <span class="project-count">${memories.length} memories</span>
        </div>
        <div class="project-cards">
          ${memories.map(m => renderMemCard(m)).join('')}
        </div>
      </div>
    `;
  }

  container.innerHTML = html || '<div class="loading-msg">No memories found.</div>';
}

// Store all memories by a unique key so onclick doesn't need inline JSON
const memoryStore = {};
let memoryStoreId = 0;

function renderMemCard(m) {
  const typeClass = m.type ? `type-${m.type}` : 'type-unknown';
  const typeLabel = m.type || 'unknown';
  const bodyPreview = m.body.substring(0, 200);
  const id = 'mem_' + (memoryStoreId++);
  memoryStore[id] = m;

  return `
    <div class="mem-card">
      <div class="mem-card-top">
        <div class="mem-card-name">${esc(m.name)}</div>
        <span class="type-badge ${typeClass}">${esc(typeLabel)}</span>
      </div>
      <div class="mem-card-file">${esc(m.file)}</div>
      ${m.description ? `<div class="mem-desc">${esc(m.description)}</div>` : ''}
      <div class="mem-body-preview">${esc(bodyPreview)}</div>
      <div class="mem-actions">
        <button class="btn" onclick="openEditModal('${id}')">&#9998; Edit</button>
        <button class="btn btn-danger" onclick="openDeleteModal('${id}')">&#128465; Delete</button>
      </div>
    </div>
  `;
}

function toggleProject(el) {
  const arrow = el.querySelector('.project-arrow');
  const cards = el.nextElementSibling;
  arrow.classList.toggle('open');
  cards.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.project-arrow').forEach(a => a.classList.add('open'));
  document.querySelectorAll('.project-cards').forEach(c => c.classList.add('open'));
}

// --- Edit Modal ---
function openEditModal(id) {
  const m = memoryStore[id];
  if (!m) return;
  editingMemory = m;
  document.getElementById('editTitle').textContent = 'Edit: ' + m.name;
  document.getElementById('eName').value = m.name;
  document.getElementById('eType').value = m.type || 'user';
  document.getElementById('eDesc').value = m.description;
  document.getElementById('eBody').value = m.body;
  document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
}

async function saveMemory() {
  if (!editingMemory) return;
  const name = document.getElementById('eName').value.trim();
  const type = document.getElementById('eType').value;
  const desc = document.getElementById('eDesc').value.trim();
  const body = document.getElementById('eBody').value;

  const content = `---\nname: ${name}\ndescription: ${desc}\ntype: ${type}\n---\n\n${body}`;

  try {
    const resp = await fetch(API + '/api/memories/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: editingMemory.filePath, content })
    });
    const result = await resp.json();
    if (result.success) {
      toast('Memory saved!');
      closeEditModal();
      loadClaudeMemories();
    } else {
      toast('Save failed: ' + result.error, true);
    }
  } catch (e) {
    toast('Save failed: ' + e.message, true);
  }
}

// --- Delete Modal ---
function openDeleteModal(id) {
  deletingMemory = memoryStore[id];
  if (!deletingMemory) return;
  document.getElementById('delName').textContent = deletingMemory.name;
  document.getElementById('deleteModal').classList.add('active');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('active');
}

async function confirmDelete() {
  if (!deletingMemory) return;

  // Handle Mem0 delete
  if (deletingMemory._mem0Id) {
    try {
      const resp = await fetch(API + '/api/mem0/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memoryId: deletingMemory._mem0Id })
      });
      toast('Mem0 memory deleted');
      closeDeleteModal();
      loadMem0();
    } catch (e) {
      toast('Delete failed: ' + e.message, true);
    }
    return;
  }

  // Handle Claude memory delete
  try {
    const resp = await fetch(API + '/api/memories/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: deletingMemory.filePath })
    });
    const result = await resp.json();
    if (result.success) {
      toast('Memory deleted');
      closeDeleteModal();
      loadClaudeMemories();
    } else {
      toast('Delete failed: ' + result.error, true);
    }
  } catch (e) {
    toast('Delete failed: ' + e.message, true);
  }
}

// --- Mem0 Cloud Memories ---
async function loadMem0() {
  const container = document.getElementById('mem0Tab');
  container.innerHTML = '<div class="loading-msg">Loading Mem0 memories...</div>';

  try {
    const resp = await fetch(API + '/api/mem0');
    const data = await resp.json();

    if (data.error) {
      container.innerHTML = `<div class="loading-msg">Error: ${esc(data.error)}</div>`;
      return;
    }

    // Mem0 API returns { results: [...] } or an array
    mem0Data = data.results || data || [];
    mem0Loaded = true;
    document.getElementById('totalMem0').textContent = mem0Data.length;
    renderMem0();
    toast('Loaded ' + mem0Data.length + ' Mem0 memories');
  } catch (e) {
    container.innerHTML = `<div class="loading-msg">Failed to connect to Mem0 API: ${esc(e.message)}</div>`;
  }
}

function renderMem0() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const container = document.getElementById('mem0Tab');

  let items = mem0Data;
  if (search) {
    items = items.filter(m =>
      (m.memory || '').toLowerCase().includes(search) ||
      (m.input || '').toLowerCase().includes(search)
    );
  }

  if (items.length === 0) {
    container.innerHTML = '<div class="loading-msg">No Mem0 memories found.</div>';
    return;
  }

  container.innerHTML = `<div class="mem0-grid">${items.map(m => {
    const text = m.memory || m.input || 'No content';
    const created = m.created_at ? new Date(m.created_at).toLocaleDateString() : '';
    const updated = m.updated_at ? new Date(m.updated_at).toLocaleDateString() : '';
    const mid = m.id || '';
    const categories = (m.categories || []).join(', ');
    const storeId = 'mem0_' + (memoryStoreId++);
    memoryStore[storeId] = { _mem0Id: mid, name: text.substring(0, 40) };

    return `
      <div class="mem0-card">
        <div class="mem0-text">${esc(text)}</div>
        <div class="mem0-meta">
          ${mid ? `<span>ID: ${esc(mid.substring(0, 8))}...</span>` : ''}
          ${created ? `<span>Created: ${created}</span>` : ''}
          ${updated ? `<span>Updated: ${updated}</span>` : ''}
          ${categories ? `<span>Tags: ${esc(categories)}</span>` : ''}
        </div>
        <div class="mem-actions" style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border);">
          <button class="btn btn-danger" onclick="openDeleteModal('${storeId}')">&#128465; Delete</button>
        </div>
      </div>
    `;
  }).join('')}</div>`;
}

// --- Modal close on overlay ---
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });
document.getElementById('deleteModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeleteModal(); });

// --- Init ---
window.addEventListener('DOMContentLoaded', loadClaudeMemories);
</script>
