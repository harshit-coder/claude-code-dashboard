<!--
  =============================================================================
  MCP Skills Manager — UI
  =============================================================================
  PURPOSE:
    Web UI to view, create, edit, and delete custom Claude Code skills.
    Skills are stored as .md files in ~/.claude/skills/ and registered
    in ~/.claude/settings.json under the "skills" array.

  HOW TO USE:
    Start the server:  node mcp-manager-server.js
    Open http://localhost:3456/skills in your browser.
  =============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-hover: #7c6ef7;
    --green: #00b894;
    --green-dim: #1a3a32;
    --red: #e74c3c;
    --red-dim: #3a1a1a;
    --orange: #f39c12;
    --yellow: #ffeaa7;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 .icon { font-size: 24px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--accent); background: var(--surface); }
  .btn-primary { background: var(--accent); border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; }

  .stats {
    font-size: 13px;
    color: var(--text-dim);
    padding: 12px 32px 4px;
  }

  .content { padding: 16px 32px 32px; }

  /* Skill cards */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .skill-card:hover { border-color: var(--accent); }
  .skill-card.orphan { border-color: var(--orange); border-style: dashed; }

  .skill-top {
    padding: 16px 18px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .skill-name {
    font-size: 16px;
    font-weight: 600;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  .skill-badge {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-registered { background: var(--green-dim); color: var(--green); }
  .badge-orphan { background: rgba(243,156,18,0.15); color: var(--orange); }

  .skill-desc {
    padding: 0 18px 12px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .skill-path {
    padding: 0 18px 12px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    word-break: break-all;
    opacity: 0.7;
  }

  .skill-usage {
    padding: 0 18px 12px;
    font-size: 12px;
    color: var(--accent);
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .skill-preview {
    padding: 0 18px 14px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .skill-preview::after {
    content: '';
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    height: 30px;
    background: linear-gradient(transparent, var(--surface));
  }

  .skill-actions {
    padding: 10px 18px;
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .skill-actions .btn { flex: 1; justify-content: center; font-size: 12px; padding: 6px 10px; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 700px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal h2 {
    font-size: 16px;
    margin-bottom: 16px;
    font-weight: 600;
  }
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea {
    min-height: 300px;
    resize: vertical;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .form-group .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 18px;
  }

  /* Delete confirm modal */
  .delete-modal .modal { width: 420px; text-align: center; }
  .delete-modal .modal h2 { color: var(--red); }
  .delete-modal .modal-actions { justify-content: center; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 9999;
    transition: transform 0.25s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="icon">&#9889;</span> Skills Manager</h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddModal()">+ New Skill</button>
  </div>
</div>
<div class="nav-bar" id="mainNav"></div>
<script src="/nav.js"></script>
<script>renderNav('skills')</script>

<div class="stats" id="stats"></div>

<div class="content" id="content">
  <div class="empty-state">
    <div class="icon">&#9889;</div>
    <div>Loading skills...</div>
  </div>
</div>

<!-- Add/Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editModalTitle">+ New Skill</h2>
    <div class="form-group">
      <label>Skill Name (used as /command)</label>
      <input type="text" id="skillName" placeholder="e.g. review-code">
      <div class="hint">Lowercase, hyphens OK. Used as: /skill-name in Claude Code</div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="skillDesc" placeholder="What this skill does (shown in skill list)">
    </div>
    <div class="form-group">
      <label>Skill Prompt (Markdown)</label>
      <textarea class="cm-editor" id="skillContent" placeholder="Write the skill instructions here...&#10;&#10;# My Skill&#10;&#10;When this skill is invoked:&#10;1. Do this&#10;2. Then that"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="saveSkill()">Save Skill</button>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay delete-modal" id="deleteModal">
  <div class="modal">
    <h2>Delete Skill</h2>
    <p style="margin-bottom:16px;color:var(--text-dim)">Are you sure you want to delete <strong id="deleteSkillName"></strong>? This will remove the file and unregister it from settings.json.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = `http://localhost:${location.port || 3456}`;

let skills = [];
let orphans = [];
let editingSkill = null; // null = new, string = editing name

async function init() {
  try {
    const resp = await fetch(API_BASE + '/api/skills');
    const result = await resp.json();
    if (result.error) { toast(result.error, true); return; }
    skills = result.skills || [];
    orphans = result.orphans || [];
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">&#9888;</div>
        <div>Cannot connect to server at ${API_BASE}</div>
      </div>`;
  }
}

function render() {
  const container = document.getElementById('content');
  const statsEl = document.getElementById('stats');
  const all = [...skills, ...orphans];

  statsEl.textContent = `${skills.length} registered skill${skills.length !== 1 ? 's' : ''}${orphans.length > 0 ? ` + ${orphans.length} unregistered file${orphans.length !== 1 ? 's' : ''}` : ''}`;

  if (all.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#9889;</div>
        <div>No custom skills found</div>
        <div style="margin-top:8px;font-size:13px;color:var(--text-dim)">Click "+ New Skill" to create your first slash command</div>
      </div>`;
    return;
  }

  let html = '<div class="skills-grid">';

  for (const skill of all) {
    const isOrphan = skill.orphan;
    const preview = (skill.content || '').split('\n').slice(0, 5).join('\n');

    html += `
      <div class="skill-card ${isOrphan ? 'orphan' : ''}">
        <div class="skill-top">
          <div class="skill-name">${esc(skill.name)}</div>
          <span class="skill-badge ${isOrphan ? 'badge-orphan' : 'badge-registered'}">${isOrphan ? 'Unregistered' : 'Active'}</span>
        </div>
        ${skill.description && !isOrphan ? `<div class="skill-desc">${esc(skill.description)}</div>` : ''}
        <div class="skill-usage">/${esc(skill.name)}</div>
        <div class="skill-path">${esc(skill.path)}</div>
        ${preview ? `<div class="skill-preview">${esc(preview)}</div>` : ''}
        <div class="skill-actions">
          <button class="btn" onclick="viewSkill('${esc(skill.name)}', ${isOrphan})">&#128065; View</button>
          <button class="btn" onclick="editSkill('${esc(skill.name)}', ${isOrphan})">&#9998; Edit</button>
          ${isOrphan ? `<button class="btn btn-green" onclick="registerOrphan('${esc(skill.name)}')">+ Register</button>` : ''}
          <button class="btn btn-danger" onclick="deleteSkill('${esc(skill.name)}')">&#128465; Delete</button>
        </div>
      </div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

function openAddModal() {
  editingSkill = null;
  document.getElementById('editModalTitle').textContent = '+ New Skill';
  document.getElementById('editSaveBtn').textContent = 'Create Skill';
  document.getElementById('skillName').value = '';
  document.getElementById('skillName').disabled = false;
  document.getElementById('skillDesc').value = '';
  document.getElementById('skillContent').value = '# My Skill\n\nWhen this skill is invoked:\n\n1. First, do this\n2. Then do that\n3. Finally, summarize the results\n';
  document.getElementById('editModal').classList.add('active');
  document.getElementById('skillName').focus();
}

function editSkill(name, isOrphan) {
  const skill = isOrphan
    ? orphans.find(s => s.name === name)
    : skills.find(s => s.name === name);
  if (!skill) return;

  editingSkill = name;
  document.getElementById('editModalTitle').textContent = 'Edit: ' + name;
  document.getElementById('editSaveBtn').textContent = 'Save Changes';
  document.getElementById('skillName').value = skill.name;
  document.getElementById('skillName').disabled = true;
  document.getElementById('skillDesc').value = skill.description || '';
  document.getElementById('skillContent').value = skill.content || '';
  document.getElementById('editModal').classList.add('active');
  document.getElementById('skillContent').focus();
}

function viewSkill(name, isOrphan) {
  const skill = isOrphan
    ? orphans.find(s => s.name === name)
    : skills.find(s => s.name === name);
  if (!skill) return;

  // Open in edit modal but as read — user can edit and save
  editSkill(name, isOrphan);
}

async function registerOrphan(name) {
  const skill = orphans.find(s => s.name === name);
  if (!skill) return;

  try {
    const resp = await fetch(API_BASE + '/api/skills/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: skill.name,
        description: 'Custom skill',
        content: skill.content
      })
    });
    const result = await resp.json();
    if (result.error) { toast(result.error, true); return; }
    toast(`Registered "${name}" in settings.json`);
    init(); // reload
  } catch (e) {
    toast('Failed: ' + e.message, true);
  }
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
}

async function saveSkill() {
  const name = document.getElementById('skillName').value.trim();
  const desc = document.getElementById('skillDesc').value.trim();
  const content = document.getElementById('skillContent').value;

  if (!name) { toast('Skill name is required', true); return; }
  if (!/^[a-z0-9][a-z0-9-]*$/.test(name)) { toast('Name must be lowercase letters, numbers, hyphens only', true); return; }
  if (!content.trim()) { toast('Skill content is required', true); return; }

  try {
    const resp = await fetch(API_BASE + '/api/skills/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: desc, content, isNew: !editingSkill })
    });
    const result = await resp.json();
    if (result.error) { toast(result.error, true); return; }
    toast(editingSkill ? `"${name}" updated` : `"${name}" created — use /${name} in Claude`);
    closeEditModal();
    init(); // reload
  } catch (e) {
    toast('Save failed: ' + e.message, true);
  }
}

let deletingSkill = null;

function deleteSkill(name) {
  deletingSkill = name;
  document.getElementById('deleteSkillName').textContent = name;
  document.getElementById('deleteModal').classList.add('active');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('active');
  deletingSkill = null;
}

async function confirmDelete() {
  if (!deletingSkill) return;
  try {
    const resp = await fetch(API_BASE + '/api/skills/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: deletingSkill })
    });
    const result = await resp.json();
    if (result.error) { toast(result.error, true); return; }
    toast(`"${deletingSkill}" deleted`);
    closeDeleteModal();
    init();
  } catch (e) {
    toast('Delete failed: ' + e.message, true);
  }
}

// Helpers
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

// Close modals on backdrop
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });
document.getElementById('deleteModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeleteModal(); });

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeEditModal(); closeDeleteModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openAddModal(); }
});

init();
</script>
</body>
</html>
