name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ============================================================
  # TAURI BUILD — triggers on push to dev branch
  # Produces a lightweight .exe (~3MB) using Tauri + WebView2
  # ============================================================
  tauri-build-windows:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-port/src-tauri -> target'

      - name: Install Tauri npm dependencies
        working-directory: tauri-port
        run: npm install

      - name: Build Tauri app (Windows)
        working-directory: tauri-port
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Tauri Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-build
          path: |
            tauri-port/src-tauri/target/release/bundle/nsis/*.exe
            tauri-port/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

  # ============================================================
  # ELECTRON BUILDS — triggers on version tags only
  # Produces full-featured cross-platform builds
  # ============================================================
  build-windows:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Run structural tests
        run: node test-electron.js

      - name: Build Windows
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Run structural tests
        run: node test-electron.js

      - name: Build Linux
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 5

  build-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Run structural tests
        run: node test-electron.js

      - name: Build macOS
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
          retention-days: 5

  # ============================================================
  # RELEASE — creates GitHub Release on version tags
  # Attaches both Electron and Tauri builds
  # ============================================================
  release:
    needs: [build-windows, build-linux, build-mac, tauri-build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # DEV PREVIEW RELEASE — creates a pre-release on dev push
  # Only includes the lightweight Tauri Windows build
  # ============================================================
  dev-preview-release:
    needs: [tauri-build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Download Tauri artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-build
          path: dev-assets

      - name: List dev artifacts
        run: find dev-assets -type f

      - name: Delete previous dev-preview release (if exists)
        run: |
          gh release delete dev-preview --yes || true
          git push origin :refs/tags/dev-preview || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev preview pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-preview
          name: "🚀 Dev Preview (latest dev build)"
          body: |
            > ⚠️ **This is an automated dev preview build** — not a stable release.
            > Built from the latest commit on the `dev` branch.

            ### What's included
            - **Tauri Windows installer** (`Claude Code Dashboard_*_x64-setup.exe`) — ~3MB lightweight build
            - Uses Windows WebView2 (built-in on Windows 10/11)

            ### Commit
            ${{ github.sha }}
          prerelease: true
          draft: false
          files: |
            dev-assets/*.exe
            dev-assets/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
