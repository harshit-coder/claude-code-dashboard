<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Marketplace</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232735; --border: #2e3345;
    --text: #e1e4ed; --text-dim: #8b8fa3; --accent: #6c5ce7; --accent-hover: #7c6ef7;
    --green: #00b894; --green-dim: #1a3a32; --red: #e74c3c; --red-dim: #3a1a1a;
    --orange: #f39c12; --blue: #0984e3; --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .header h1 .icon { font-size: 24px; }

  .search-bar {
    display: flex; gap: 10px; padding: 20px 32px; align-items: center;
  }
  .search-input {
    flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 15px; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-green { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-green:hover { opacity: 0.9; }
  .btn-danger { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .quick-filters {
    display: flex; gap: 6px; padding: 0 32px 12px; flex-wrap: wrap;
  }
  .filter-chip {
    padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); font-size: 12px; cursor: pointer;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .stats { font-size: 13px; color: var(--text-dim); padding: 0 32px 8px; }
  .content { padding: 0 32px 32px; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }

  .pkg-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; transition: border-color 0.15s;
    display: flex; flex-direction: column;
  }
  .pkg-card:hover { border-color: var(--accent); }
  .pkg-card.installed { border-color: var(--green); }

  .pkg-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .pkg-name {
    font-size: 14px; font-weight: 600; font-family: 'Cascadia Code', 'Fira Code', monospace;
    word-break: break-all;
  }
  .pkg-version { font-size: 11px; color: var(--text-dim); }
  .pkg-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; flex: 1;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .pkg-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .pkg-meta-item { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }

  .pkg-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  }
  .badge-keyword { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .badge-installed { background: var(--green-dim); color: var(--green); }
  .badge-official { background: rgba(9,132,227,0.15); color: var(--blue); }

  .pkg-actions { display: flex; gap: 8px; }
  .pkg-actions .btn { flex: 1; justify-content: center; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto; padding: 24px;
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; font-weight: 600; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-group .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .env-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .env-row input { flex: 1; }
  .env-row .btn { flex-shrink: 0; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .loading .spinner {
    display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  .load-more { text-align: center; padding: 16px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 22px; border-radius: 8px; font-size: 13px; z-index: 9999;
    transition: transform 0.25s ease; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .readme-preview {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; font-size: 12px; max-height: 200px; overflow-y: auto;
    white-space: pre-wrap; line-height: 1.5; color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="header">
  <h1><span class="icon">&#128722;</span> MCP Marketplace</h1>
</div>
<div class="nav-bar" id="mainNav"></div>
<script src="/nav.js"></script>
<script>renderNav('marketplace')</script>

<div class="search-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Search npm for MCP servers..." value="mcp server">
  <button class="btn btn-primary" onclick="doSearch()">&#128269; Search</button>
</div>

<div class="quick-filters">
  <button class="filter-chip active" onclick="quickSearch('mcp server', this)">All MCP</button>
  <button class="filter-chip" onclick="quickSearch('@modelcontextprotocol', this)">Official</button>
  <button class="filter-chip" onclick="quickSearch('mcp server github', this)">GitHub</button>
  <button class="filter-chip" onclick="quickSearch('mcp server database', this)">Database</button>
  <button class="filter-chip" onclick="quickSearch('mcp server ai', this)">AI / LLM</button>
  <button class="filter-chip" onclick="quickSearch('mcp server browser', this)">Browser</button>
  <button class="filter-chip" onclick="quickSearch('mcp server slack', this)">Slack</button>
  <button class="filter-chip" onclick="quickSearch('mcp server filesystem', this)">Filesystem</button>
  <button class="filter-chip" onclick="quickSearch('mcp server kubernetes', this)">Kubernetes</button>
  <button class="filter-chip" onclick="quickSearch('mcp server notion', this)">Notion</button>
  <button class="filter-chip" onclick="quickSearch('mcp server google', this)">Google</button>
  <button class="filter-chip" onclick="quickSearch('mcp server api', this)">API</button>
</div>

<div class="stats" id="stats"></div>
<div class="content" id="content">
  <div class="loading"><div class="spinner"></div><div>Searching npm registry...</div></div>
</div>

<!-- Install modal -->
<div class="modal-overlay" id="installModal">
  <div class="modal">
    <h2 id="installTitle">Install MCP Server</h2>
    <div class="form-group">
      <label>Server Name (identifier)</label>
      <input type="text" id="installName" placeholder="e.g. my-server">
      <div class="hint">Name used to identify this server in your config</div>
    </div>
    <div class="form-group">
      <label>Command</label>
      <input type="text" id="installCmd" value="npx" readonly style="opacity:0.7">
    </div>
    <div class="form-group">
      <label>Args (JSON array)</label>
      <input type="text" id="installArgs" placeholder='["-y", "package-name"]'>
    </div>
    <div class="form-group">
      <label>Environment Variables (optional)</label>
      <div id="envVarsContainer"></div>
      <button class="btn btn-sm" onclick="addEnvVar()" style="margin-top:6px">+ Add Env Var</button>
    </div>
    <div id="readmeSection" style="display:none">
      <div class="form-group">
        <label>README Preview</label>
        <div class="readme-preview" id="readmeContent"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeInstallModal()">Cancel</button>
      <button class="btn btn-green" onclick="confirmInstall()">&#128230; Install</button>
    </div>
  </div>
</div>

<!-- Uninstall confirm -->
<div class="modal-overlay" id="uninstallModal">
  <div class="modal" style="width:420px;text-align:center">
    <h2 style="color:var(--red)">Uninstall Server</h2>
    <p style="margin-bottom:16px;color:var(--text-dim)">Remove <strong id="uninstallName"></strong> from your config?</p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn" onclick="closeUninstallModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmUninstall()">Uninstall</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = `http://localhost:${location.port || 3456}`;
let packages = [];
let installedServers = {};
let searchTotal = 0;
let currentQuery = 'mcp server';
let currentFrom = 0;
let pendingUninstall = null;

async function init() {
  // Load installed servers
  try {
    const resp = await fetch(API + '/api/config');
    const result = await resp.json();
    if (result.data) {
      const d = result.data;
      installedServers = { ...(d.mcpServers || {}), ...(d.disabledMcpServers || {}) };
    }
  } catch (_) {}
  // Also from settings.json via hooks endpoint
  try {
    const resp = await fetch(API + '/api/hooks');
    const result = await resp.json();
    // hooks endpoint reads settings.json, but we need mcpServers from there too
    // Let's use the settings-local for that... actually let's just fetch settings
  } catch (_) {}

  doSearch();
}

async function doSearch(append) {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  currentQuery = query;
  if (!append) { currentFrom = 0; packages = []; }

  if (!append) {
    document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div>Searching npm registry...</div></div>';
  }

  try {
    const resp = await fetch(`${API}/api/npm/search?q=${encodeURIComponent(query)}&size=30&from=${currentFrom}`);
    const data = await resp.json();

    if (data.error) { toast(data.error, true); return; }

    searchTotal = data.total || 0;
    const newPkgs = (data.objects || []).map(o => ({
      name: o.package.name,
      version: o.package.version,
      description: o.package.description || '',
      keywords: o.package.keywords || [],
      date: o.package.date,
      publisher: o.package.publisher && o.package.publisher.username,
      links: o.package.links || {},
      score: o.score && o.score.final,
    }));

    packages = append ? [...packages, ...newPkgs] : newPkgs;
    currentFrom += newPkgs.length;
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">&#9888;</div><div>Search failed: ${esc(e.message)}</div></div>`;
  }
}

function quickSearch(query, btn) {
  document.getElementById('searchInput').value = query;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doSearch();
}

function render() {
  document.getElementById('stats').textContent = `${searchTotal} results found, showing ${packages.length}`;

  if (packages.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">&#128722;</div><div>No packages found</div></div>';
    return;
  }

  let html = '<div class="grid">';
  for (const pkg of packages) {
    const isInstalled = isServerInstalled(pkg.name);
    const isOfficial = pkg.name.startsWith('@modelcontextprotocol/');
    const dateStr = pkg.date ? new Date(pkg.date).toLocaleDateString() : '';

    html += `
      <div class="pkg-card ${isInstalled ? 'installed' : ''}">
        <div class="pkg-top">
          <div>
            <div class="pkg-name">${esc(pkg.name)}</div>
            <div class="pkg-version">v${esc(pkg.version)}</div>
          </div>
          ${isInstalled ? '<span class="badge badge-installed">Installed</span>' : ''}
          ${isOfficial ? '<span class="badge badge-official">Official</span>' : ''}
        </div>
        <div class="pkg-desc">${esc(pkg.description)}</div>
        <div class="pkg-meta">
          ${pkg.publisher ? `<span class="pkg-meta-item">&#128100; ${esc(pkg.publisher)}</span>` : ''}
          ${dateStr ? `<span class="pkg-meta-item">&#128197; ${dateStr}</span>` : ''}
          ${pkg.links.npm ? `<a href="${esc(pkg.links.npm)}" target="_blank" class="pkg-meta-item" style="color:var(--accent);text-decoration:none">&#128279; npm</a>` : ''}
          ${pkg.links.repository ? `<a href="${esc(pkg.links.repository)}" target="_blank" class="pkg-meta-item" style="color:var(--accent);text-decoration:none">&#128187; repo</a>` : ''}
        </div>
        ${pkg.keywords.length > 0 ? `<div class="pkg-badges">${pkg.keywords.slice(0, 5).map(k => `<span class="badge badge-keyword">${esc(k)}</span>`).join('')}</div>` : ''}
        <div class="pkg-actions">
          ${isInstalled
            ? `<button class="btn btn-danger btn-sm" onclick="uninstallServer('${esc(pkg.name)}')">&#128465; Uninstall</button>`
            : `<button class="btn btn-green btn-sm" onclick="openInstallModal('${esc(pkg.name)}')">&#128230; Install</button>`
          }
          <button class="btn btn-sm" onclick="viewDetails('${esc(pkg.name)}')">&#128196; Details</button>
        </div>
      </div>`;
  }
  html += '</div>';

  if (currentFrom < searchTotal) {
    html += `<div class="load-more"><button class="btn" onclick="doSearch(true)">Load More (${searchTotal - currentFrom} remaining)</button></div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function isServerInstalled(npmName) {
  // Check by npm package name in args
  for (const [key, config] of Object.entries(installedServers)) {
    const args = (config.args || []).join(' ');
    if (args.includes(npmName) || key === npmName || key === npmName.replace(/^@.*\//, '').replace('server-', '').replace('mcp-', '')) {
      return true;
    }
  }
  return false;
}

function getInstalledKey(npmName) {
  for (const [key, config] of Object.entries(installedServers)) {
    const args = (config.args || []).join(' ');
    if (args.includes(npmName) || key === npmName || key === npmName.replace(/^@.*\//, '').replace('server-', '').replace('mcp-', '')) {
      return key;
    }
  }
  return null;
}

// ── Install ──
function openInstallModal(npmName) {
  // Derive a short server name
  let shortName = npmName
    .replace(/^@.*\//, '')
    .replace(/^server-/, '')
    .replace(/^mcp-server-/, '')
    .replace(/^mcp-/, '')
    .replace(/-mcp$/, '');

  document.getElementById('installTitle').textContent = 'Install: ' + npmName;
  document.getElementById('installName').value = shortName;
  document.getElementById('installCmd').value = 'npx';
  document.getElementById('installArgs').value = JSON.stringify(['-y', npmName]);
  document.getElementById('envVarsContainer').innerHTML = '';
  document.getElementById('readmeSection').style.display = 'none';
  document.getElementById('installModal').classList.add('active');

  // Fetch details in background
  fetchDetails(npmName);
}

async function fetchDetails(npmName) {
  try {
    const resp = await fetch(`${API}/api/npm/package?name=${encodeURIComponent(npmName)}`);
    const data = await resp.json();
    if (data.readme) {
      document.getElementById('readmeContent').textContent = data.readme;
      document.getElementById('readmeSection').style.display = 'block';

      // Auto-detect environment variables from README
      const FALSE_POSITIVES = new Set([
        'PATH', 'HOME', 'NODE_ENV', 'NODE_PATH', 'NODE_MODULES', 'SHELL',
        'USER', 'USERNAME', 'HOSTNAME', 'LANG', 'TERM', 'DISPLAY',
        'TMPDIR', 'TEMP', 'TMP', 'PWD', 'OLDPWD', 'EDITOR', 'VISUAL',
        'HTTP', 'HTTPS', 'PORT', 'HOST', 'DEBUG', 'VERBOSE', 'TRUE', 'FALSE',
        'NULL', 'UNDEFINED', 'STRING', 'NUMBER', 'BOOLEAN', 'OBJECT',
        'STDIN', 'STDOUT', 'STDERR', 'FILE', 'DIRECTORY', 'CONFIG',
        'NOTE', 'TODO', 'FIXME', 'HACK', 'README', 'LICENSE', 'EXAMPLE',
        'USAGE', 'INSTALL', 'SETUP', 'BUILD', 'TEST', 'DEVELOPMENT',
        'PRODUCTION', 'STAGING', 'LOCAL', 'REMOTE', 'SERVER', 'CLIENT',
        'INDEX', 'NAME', 'TYPE', 'VALUE', 'DATA', 'RESULT', 'ERROR',
        'NODE_OPTIONS', 'NPM_CONFIG', 'GITHUB_TOKEN'
      ]);

      const envRegex = /(?:process\.env\.|export\s+|^)([A-Z][A-Z0-9_]{3,})/gm;
      const detectedVars = new Set();
      let match;
      while ((match = envRegex.exec(data.readme)) !== null) {
        const varName = match[1];
        if (!FALSE_POSITIVES.has(varName) && (
          varName.includes('API_KEY') || varName.includes('TOKEN') ||
          varName.includes('SECRET') || varName.includes('_URL') ||
          varName.includes('_HOST') || varName.includes('_PORT') ||
          varName.includes('_PATH') || varName.includes('_DIR') ||
          varName.includes('_ID') || varName.includes('_KEY') ||
          varName.endsWith('_DB') || varName.endsWith('_DSN') ||
          data.readme.includes('process.env.' + varName) ||
          varName.length > 6
        )) {
          detectedVars.add(varName);
        }
      }

      if (detectedVars.size > 0) {
        // Show auto-detected label
        const container = document.getElementById('envVarsContainer');
        const label = document.createElement('div');
        label.style.cssText = 'font-size:11px;color:var(--green);margin-bottom:6px;font-weight:500;';
        label.textContent = 'Auto-detected from README (' + detectedVars.size + ' variables):';
        container.parentElement.insertBefore(label, container);

        // Add env var rows for each detected variable
        for (const varName of detectedVars) {
          addEnvVar(varName, '');
        }
      }
    }
  } catch (_) {}
}

async function viewDetails(npmName) {
  openInstallModal(npmName);
}

function addEnvVar(key, val) {
  const container = document.getElementById('envVarsContainer');
  const row = document.createElement('div');
  row.className = 'env-row';
  row.innerHTML = `
    <input type="text" placeholder="KEY" value="${esc(key || '')}" class="env-key">
    <input type="text" placeholder="value" value="${esc(val || '')}" class="env-val">
    <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">&#10005;</button>
  `;
  container.appendChild(row);
}

function closeInstallModal() {
  document.getElementById('installModal').classList.remove('active');
}

async function confirmInstall() {
  const name = document.getElementById('installName').value.trim();
  const cmd = document.getElementById('installCmd').value.trim();
  let args;
  try { args = JSON.parse(document.getElementById('installArgs').value); }
  catch (_) { toast('Invalid args JSON', true); return; }

  if (!name) { toast('Server name is required', true); return; }

  // Collect env vars
  const env = {};
  document.querySelectorAll('.env-row').forEach(row => {
    const key = row.querySelector('.env-key').value.trim();
    const val = row.querySelector('.env-val').value.trim();
    if (key) env[key] = val;
  });

  const config = { command: cmd, args };
  if (Object.keys(env).length > 0) config.env = env;

  try {
    const resp = await fetch(API + '/api/marketplace/install', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, config })
    });
    const result = await resp.json();
    if (result.error) { toast(result.error, true); return; }

    // Update local state
    installedServers[name] = config;
    toast(`"${name}" installed! Restart Claude to activate.`);
    closeInstallModal();
    render();
  } catch (e) {
    toast('Install failed: ' + e.message, true);
  }
}

// ── Uninstall ──
function uninstallServer(npmName) {
  const key = getInstalledKey(npmName);
  if (!key) { toast('Server not found', true); return; }
  pendingUninstall = key;
  document.getElementById('uninstallName').textContent = key;
  document.getElementById('uninstallModal').classList.add('active');
}

function closeUninstallModal() {
  document.getElementById('uninstallModal').classList.remove('active');
  pendingUninstall = null;
}

async function confirmUninstall() {
  if (!pendingUninstall) return;
  try {
    const resp = await fetch(API + '/api/marketplace/uninstall', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: pendingUninstall })
    });
    const result = await resp.json();
    if (result.error) { toast(result.error, true); return; }

    delete installedServers[pendingUninstall];
    toast(`"${pendingUninstall}" removed`);
    closeUninstallModal();
    render();
  } catch (e) {
    toast('Uninstall failed: ' + e.message, true);
  }
}

// ── Helpers ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 3000);
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('installModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeInstallModal(); });
document.getElementById('uninstallModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeUninstallModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeInstallModal(); closeUninstallModal(); } });

init();
</script>
</body>
</html>
