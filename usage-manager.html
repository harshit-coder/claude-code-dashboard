<!--
  =============================================================================
  Usage Dashboard — UI
  =============================================================================
  Data sources:
    ~/.claude/stats-cache.json  — daily activity, model tokens, model usage,
                                  hour counts, longest session, totals
    ~/.claude/history.jsonl     — prompt history with timestamps
  =============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-hover: #7c6ef7;
    --green: #00b894;
    --green-dim: #1a3a32;
    --red: #e74c3c;
    --orange: #f39c12;
    --blue: #0984e3;
    --pink: #e84393;
    --cyan: #00cec9;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .header h1 .icon { font-size: 24px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); background: var(--surface); }

  .content { padding: 16px 32px 32px; }

  /* Stale data warning */
  .stale-warn {
    background: rgba(243,156,18,0.1);
    border: 1px solid var(--orange);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--orange);
    margin-bottom: 16px;
    display: none;
  }
  .stale-warn.show { display: block; }

  /* Summary cards */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
  }
  .summary-card .label {
    font-size: 11px; color: var(--text-dim); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .summary-card .value { font-size: 26px; font-weight: 700; }
  .summary-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .val-accent { color: var(--accent); }
  .val-green { color: var(--green); }
  .val-blue { color: var(--blue); }
  .val-orange { color: var(--orange); }
  .val-pink { color: var(--pink); }
  .val-cyan { color: var(--cyan); }

  /* Context usage progress bar */
  .context-bar-wrap { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .context-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .context-bar.green { background: var(--green); }
  .context-bar.orange { background: var(--orange); }
  .context-bar.red { background: var(--red); }

  /* Chart sections */
  .chart-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 24px;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .chart-title { font-size: 15px; font-weight: 600; }
  .chart-filters { display: flex; gap: 6px; }
  .chart-filter {
    padding: 4px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-dim); font-size: 11px; cursor: pointer;
  }
  .chart-filter:hover { border-color: var(--accent); color: var(--text); }
  .chart-filter.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .chart-canvas-wrap { position: relative; width: 100%; height: 260px; }
  .chart-canvas-wrap canvas { width: 100%; height: 100%; }

  .chart-legend { display: flex; gap: 20px; margin-top: 12px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Two-column layout */
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  @media (max-width: 900px) { .row-2 { grid-template-columns: 1fr; } }

  /* Model usage table */
  .model-table { width: 100%; border-collapse: collapse; }
  .model-table th {
    text-align: left; padding: 8px 10px; font-size: 11px;
    color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border);
  }
  .model-table td {
    padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .model-table tr:hover td { background: var(--surface2); }
  .model-name { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; }
  .model-bar-wrap { width: 100px; height: 6px; background: var(--surface2); border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 8px; }
  .model-bar { height: 100%; border-radius: 3px; background: var(--accent); }

  /* Hour chart */
  .hour-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; padding-top: 10px; }
  .hour-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .hour-bar { width: 100%; min-width: 8px; border-radius: 3px 3px 0 0; background: var(--accent); transition: height 0.3s; }
  .hour-label { font-size: 9px; color: var(--text-dim); margin-top: 4px; }
  .hour-val { font-size: 9px; color: var(--text-dim); margin-bottom: 2px; }

  /* Heatmap */
  .heatmap-wrap { overflow-x: auto; padding: 8px 0; }
  .heatmap { display: flex; gap: 3px; }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell { width: 14px; height: 14px; border-radius: 3px; background: var(--surface2); cursor: pointer; }
  .heatmap-cell:hover { outline: 1px solid var(--text-dim); }
  .heat-1 { background: rgba(108,92,231,0.2); }
  .heat-2 { background: rgba(108,92,231,0.4); }
  .heat-3 { background: rgba(108,92,231,0.6); }
  .heat-4 { background: rgba(108,92,231,0.8); }
  .heat-5 { background: rgba(108,92,231,1.0); }
  .heatmap-tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; pointer-events: none;
    z-index: 500; display: none;
  }

  /* Tabs */
  .tabs-bar { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    padding: 10px 20px; border: none; background: none; color: var(--text-dim);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* History */
  .search-box {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px;
    outline: none; width: 300px; margin-bottom: 12px;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: auto; max-height: 500px;
  }
  .history-table { width: 100%; border-collapse: collapse; }
  .history-table th {
    text-align: left; padding: 8px 12px; font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface);
  }
  .history-table td {
    padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--border);
    max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-table tr:hover td { background: var(--surface2); }
  .prompt-text { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; }
  .project-tag {
    font-size: 11px; padding: 1px 8px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .time-tag { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  /* Projects */
  .project-row {
    display: flex; align-items: center; gap: 12px; padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .project-row:last-child { border-bottom: none; }
  .project-name { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-bar-wrap { width: 200px; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .project-bar { height: 100%; background: var(--accent); border-radius: 4px; }
  .project-count { font-size: 12px; color: var(--text-dim); width: 70px; text-align: right; flex-shrink: 0; }

  .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 22px; border-radius: 8px; font-size: 13px; z-index: 9999;
    transition: transform 0.25s ease; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="icon">&#128202;</span> Usage Dashboard</h1>
  <div class="header-actions"></div>
</div>
<div class="nav-bar" id="mainNav"></div>
<script src="/nav.js"></script>
<script>renderNav('usage')</script>

<div class="content">
  <div class="stale-warn" id="staleWarn"></div>
  <div class="summary-row" id="summaryRow"></div>

  <!-- Activity chart -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">Daily Activity</div>
      <div class="chart-filters">
        <button class="chart-filter active" onclick="setRange('7d', this)">7d</button>
        <button class="chart-filter" onclick="setRange('14d', this)">14d</button>
        <button class="chart-filter" onclick="setRange('30d', this)">30d</button>
        <button class="chart-filter" onclick="setRange('all', this)">All</button>
      </div>
    </div>
    <div class="chart-canvas-wrap"><canvas id="chart"></canvas></div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Messages</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Tool Calls</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Sessions</div>
    </div>
  </div>

  <!-- Model usage + Hour chart side by side -->
  <div class="row-2">
    <div class="chart-section">
      <div class="chart-title" style="margin-bottom:14px">Model Usage (Tokens)</div>
      <div id="modelTable"></div>
    </div>
    <div class="chart-section">
      <div class="chart-title" style="margin-bottom:14px">Activity by Hour of Day</div>
      <div class="hour-chart" id="hourChart"></div>
      <div style="display:flex;gap:14px;margin-top:8px;justify-content:center;flex-wrap:wrap;">
        <span style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--orange);display:inline-block;"></span>Night (12a-6a)</span>
        <span style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;"></span>Morning (6a-12p)</span>
        <span style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;"></span>Afternoon (12p-6p)</span>
        <span style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;"></span>Evening (6p-12a)</span>
      </div>
    </div>
  </div>

  <!-- Token chart per day by model -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">Daily Tokens by Model</div>
      <div class="chart-filters">
        <button class="chart-filter active" onclick="setTokenRange('7d', this)">7d</button>
        <button class="chart-filter" onclick="setTokenRange('14d', this)">14d</button>
        <button class="chart-filter" onclick="setTokenRange('30d', this)">30d</button>
        <button class="chart-filter" onclick="setTokenRange('all', this)">All</button>
      </div>
    </div>
    <div class="chart-canvas-wrap"><canvas id="tokenChart"></canvas></div>
    <div id="tokenLegend" class="chart-legend"></div>
  </div>

  <!-- Heatmap -->
  <div class="chart-section">
    <div class="chart-title" style="margin-bottom:12px">Activity Heatmap</div>
    <div class="heatmap-wrap"><div class="heatmap" id="heatmap"></div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('history', this)">Prompt History</button>
    <button class="tab-btn" onclick="switchTab('projects', this)">By Project</button>
  </div>
  <div id="historyTab">
    <input type="text" class="search-box" id="historySearch" placeholder="Search prompts..." oninput="renderHistory()">
    <div class="table-wrap" id="historyTable"></div>
  </div>
  <div id="projectsTab" style="display:none">
    <div class="chart-section" id="projectsContent"></div>
  </div>
</div>

<div class="heatmap-tooltip" id="heatmapTooltip"></div>
<div class="toast" id="toast"></div>

<script>
const API_BASE = `http://localhost:${location.port || 3456}`;

let statsData = {};
let historyData = [];
let chartRange = '7d';
let tokenRange = '7d';

const MODEL_COLORS = {
  'claude-sonnet-4-6': '#6c5ce7',
  'claude-opus-4-6': '#e84393',
  'claude-opus-4-5-20251101': '#0984e3',
  'minimax/minimax-m2.5-20260211': '#00b894',
  'moonshotai/kimi-k2.5-0127': '#f39c12',
  'stepfun/step-3.5-flash:free': '#00cec9'
};
function modelColor(name) { return MODEL_COLORS[name] || '#8b8fa3'; }
function shortModel(name) {
  return name.replace('claude-', '').replace('-20251101', '').replace('minimax/minimax-', '').replace('moonshotai/', '').replace('stepfun/', '').replace(':free', '');
}

async function init() {
  const [statsResp, histResp] = await Promise.all([
    fetch(API_BASE + '/api/usage/stats').then(r => r.json()).catch(() => ({})),
    fetch(API_BASE + '/api/usage/history?limit=500').then(r => r.json()).catch(() => ({ history: [], total: 0 }))
  ]);
  statsData = statsResp;
  historyData = histResp.history || [];

  checkStale();
  renderSummary(histResp.total);
  renderChart();
  renderModelTable();
  renderHourChart();
  renderTokenChart();
  renderHeatmap();
  renderHistory();
  renderProjects();
}

function checkStale() {
  const last = statsData.lastComputedDate;
  if (!last) return;
  const today = new Date().toISOString().slice(0, 10);
  if (last < today) {
    const el = document.getElementById('staleWarn');
    const daysDiff = Math.floor((new Date(today) - new Date(last)) / 86400000);
    el.innerHTML = `Stats last computed on <strong>${last}</strong> (${daysDiff} day${daysDiff > 1 ? 's' : ''} ago). Data from ${last} to today may be missing. Run <code>claude</code> to refresh stats.`;
    el.classList.add('show');
  }
}

function renderSummary(totalPrompts) {
  const totalMsgs = statsData.totalMessages || 0;
  const totalSessions = statsData.totalSessions || 0;
  const days = statsData.dailyActivity || [];
  const totalTools = days.reduce((s, d) => s + d.toolCallCount, 0);
  const activeDays = days.length;
  const longest = statsData.longestSession;
  const longestDur = longest ? (longest.duration / 3600000).toFixed(1) : 0;
  const firstDate = statsData.firstSessionDate ? new Date(statsData.firstSessionDate).toLocaleDateString() : '-';

  // Total output tokens across all models
  const mu = statsData.modelUsage || {};
  const totalOutTokens = Object.values(mu).reduce((s, m) => s + (m.outputTokens || 0), 0);

  const today = new Date().toISOString().slice(0, 10);
  const todayData = days.find(d => d.date === today);

  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card">
      <div class="label">Total Messages</div>
      <div class="value val-accent">${totalMsgs.toLocaleString()}</div>
      <div class="sub">since ${firstDate}</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Sessions</div>
      <div class="value val-blue">${totalSessions.toLocaleString()}</div>
      <div class="sub">${activeDays} active days</div>
    </div>
    <div class="summary-card">
      <div class="label">Tool Calls</div>
      <div class="value val-green">${totalTools.toLocaleString()}</div>
      <div class="sub">${activeDays > 0 ? Math.round(totalTools / activeDays) : 0} avg/day</div>
    </div>
    <div class="summary-card">
      <div class="label">Output Tokens</div>
      <div class="value val-orange">${totalOutTokens.toLocaleString()}</div>
      <div class="sub">across ${Object.keys(mu).length} models</div>
    </div>
    <div class="summary-card">
      <div class="label">Prompts Sent</div>
      <div class="value val-pink">${totalPrompts.toLocaleString()}</div>
      <div class="sub">${activeDays > 0 ? Math.round(totalPrompts / activeDays) : 0} avg/day</div>
    </div>
    <div class="summary-card">
      <div class="label">Longest Session</div>
      <div class="value val-cyan">${longestDur}h</div>
      <div class="sub">${longest ? longest.messageCount + ' messages' : '-'}</div>
    </div>
    ${(() => {
      // Last Session Context — sum output_tokens from the last conversation
      const sessions = statsData.sessions || [];
      const dailyModelTokens = statsData.dailyModelTokens || [];
      let lastSessionTokens = 0;
      // Try to get from sessions data if available
      if (sessions.length > 0) {
        const last = sessions[sessions.length - 1];
        lastSessionTokens = last.outputTokens || last.totalTokens || 0;
      } else {
        // Estimate from the last day's output tokens
        const lastDay = dailyModelTokens.length > 0 ? dailyModelTokens[dailyModelTokens.length - 1] : null;
        if (lastDay && lastDay.tokensByModel) {
          lastSessionTokens = Object.values(lastDay.tokensByModel).reduce((s, v) => s + v, 0);
        } else {
          // Fallback: use last day's totalTokens from dailyActivity
          const lastActivity = days.length > 0 ? days[days.length - 1] : null;
          lastSessionTokens = lastActivity ? (lastActivity.totalTokens || 0) : 0;
        }
      }
      const contextWindow = 200000;
      const pct = contextWindow > 0 ? (lastSessionTokens / contextWindow) * 100 : 0;
      const clampedPct = Math.min(pct, 100);
      const colorClass = pct >= 80 ? 'red' : pct >= 50 ? 'orange' : 'green';
      const valColorClass = pct >= 80 ? 'val-orange' : pct >= 50 ? 'val-orange' : 'val-green';
      return `
        <div class="summary-card">
          <div class="label">Last Session Context</div>
          <div class="value ${valColorClass}">${pct.toFixed(1)}%</div>
          <div class="context-bar-wrap"><div class="context-bar ${colorClass}" style="width:${clampedPct}%"></div></div>
          <div class="sub">${lastSessionTokens.toLocaleString()} tokens of 200K context window</div>
        </div>`;
    })()}
  `;
}

// ── Activity Chart ──
function setRange(range, btn) {
  chartRange = range;
  document.querySelectorAll('.chart-section:nth-child(2) .chart-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  let days = [...(statsData.dailyActivity || [])].sort((a, b) => a.date.localeCompare(b.date));
  if (chartRange === '7d') days = days.slice(-7);
  else if (chartRange === '14d') days = days.slice(-14);
  else if (chartRange === '30d') days = days.slice(-30);

  if (!days.length) { ctx.clearRect(0,0,W,H); ctx.fillStyle='#8b8fa3'; ctx.font='14px Segoe UI'; ctx.textAlign='center'; ctx.fillText('No data',W/2,H/2); return; }

  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  const maxVal = Math.max(...days.map(d => Math.max(d.messageCount, d.toolCallCount)), 1);
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.strokeStyle = '#2e3345'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b8fa3'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal - (maxVal / 4) * i), pad.left - 8, y + 4);
  }

  const gw = cw / days.length;
  const bw = Math.max(Math.min(gw * 0.25, 20), 3);
  const gap = Math.max(bw * 0.2, 1);

  for (let i = 0; i < days.length; i++) {
    const d = days[i], x = pad.left + gw * i + gw / 2;
    const mh = (d.messageCount / maxVal) * ch;
    ctx.fillStyle = '#6c5ce7'; ctx.fillRect(x - bw * 1.5 - gap, pad.top + ch - mh, bw, mh);
    const th = (d.toolCallCount / maxVal) * ch;
    ctx.fillStyle = '#00b894'; ctx.fillRect(x - bw / 2, pad.top + ch - th, bw, th);
    const sh = (d.sessionCount / maxVal) * ch;
    ctx.fillStyle = '#f39c12'; ctx.fillRect(x + bw / 2 + gap, pad.top + ch - sh, bw, sh);
    ctx.fillStyle = '#8b8fa3'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(d.date.slice(5), x, H - pad.bottom + 16);
  }
}

// ── Model Usage Table ──
function renderModelTable() {
  const mu = statsData.modelUsage || {};
  const entries = Object.entries(mu).sort((a, b) => (b[1].outputTokens || 0) - (a[1].outputTokens || 0));
  if (!entries.length) { document.getElementById('modelTable').innerHTML = '<div style="color:var(--text-dim)">No model data</div>'; return; }
  const maxTokens = Math.max(...entries.map(e => (e[1].outputTokens || 0) + (e[1].inputTokens || 0)), 1);

  let html = `<table class="model-table"><thead><tr><th>Model</th><th>Output</th><th>Input</th><th>Cache Read</th><th></th></tr></thead><tbody>`;
  for (const [name, data] of entries) {
    const total = (data.outputTokens || 0) + (data.inputTokens || 0);
    const pct = (total / maxTokens) * 100;
    html += `<tr>
      <td><span class="model-name" style="color:${modelColor(name)}">${esc(shortModel(name))}</span></td>
      <td>${(data.outputTokens||0).toLocaleString()}</td>
      <td>${(data.inputTokens||0).toLocaleString()}</td>
      <td>${(data.cacheReadInputTokens||0).toLocaleString()}</td>
      <td><div class="model-bar-wrap"><div class="model-bar" style="width:${pct}%;background:${modelColor(name)}"></div></div></td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('modelTable').innerHTML = html;
}

// ── Hour Chart ──
function renderHourChart() {
  const hc = statsData.hourCounts || {};
  const maxH = Math.max(...Object.values(hc), 1);
  let html = '';
  for (let h = 0; h < 24; h++) {
    const count = hc[String(h)] || 0;
    const pct = (count / maxH) * 100;
    const label = h === 0 ? '12a' : h < 12 ? h + 'a' : h === 12 ? '12p' : (h - 12) + 'p';
    html += `<div class="hour-bar-wrap">
      ${count > 0 ? `<div class="hour-val">${count}</div>` : ''}
      <div class="hour-bar" style="height:${Math.max(pct, 2)}%;background:${h >= 6 && h < 12 ? 'var(--green)' : h >= 12 && h < 18 ? 'var(--blue)' : h >= 18 ? 'var(--accent)' : 'var(--orange)'}"></div>
      <div class="hour-label">${label}</div>
    </div>`;
  }

  // Find most and least active hours
  let maxHour = 0, minHour = 0, maxCount = -1, minCount = Infinity;
  for (let h = 0; h < 24; h++) {
    const c = hc[String(h)] || 0;
    if (c > maxCount) { maxCount = c; maxHour = h; }
    if (c < minCount) { minCount = c; minHour = h; }
  }
  const fmtHour = (h) => h === 0 ? '12am' : h < 12 ? h + 'am' : h === 12 ? '12pm' : (h - 12) + 'pm';
  html += `<div style="width:100%;margin-top:10px;font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;">
    <span>Most active: <strong style="color:var(--green)">${fmtHour(maxHour)}</strong> (${maxCount} sessions)</span>
    <span>Least active: <strong style="color:var(--orange)">${fmtHour(minHour)}</strong> (${minCount} sessions)</span>
  </div>`;

  document.getElementById('hourChart').innerHTML = html;
}

// ── Token Chart ──
function setTokenRange(range, btn) {
  tokenRange = range;
  btn.parentElement.querySelectorAll('.chart-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTokenChart();
}

function renderTokenChart() {
  const canvas = document.getElementById('tokenChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  let days = [...(statsData.dailyModelTokens || [])].sort((a, b) => a.date.localeCompare(b.date));
  if (tokenRange === '7d') days = days.slice(-7);
  else if (tokenRange === '14d') days = days.slice(-14);
  else if (tokenRange === '30d') days = days.slice(-30);

  // Collect all models
  const allModels = new Set();
  for (const d of days) { for (const m of Object.keys(d.tokensByModel || {})) allModels.add(m); }
  const models = [...allModels];

  if (!days.length) { ctx.clearRect(0,0,W,H); ctx.fillStyle='#8b8fa3'; ctx.font='14px Segoe UI'; ctx.textAlign='center'; ctx.fillText('No data',W/2,H/2); return; }

  // Stacked bar
  const pad = { top: 20, right: 20, bottom: 40, left: 60 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  const totals = days.map(d => Object.values(d.tokensByModel || {}).reduce((s, v) => s + v, 0));
  const maxVal = Math.max(...totals, 1);

  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.strokeStyle = '#2e3345'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b8fa3'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'right';
    const v = maxVal - (maxVal / 4) * i;
    ctx.fillText(v >= 1000 ? Math.round(v / 1000) + 'k' : Math.round(v), pad.left - 8, y + 4);
  }

  const gw = cw / days.length;
  const bw = Math.max(Math.min(gw * 0.6, 30), 6);

  for (let i = 0; i < days.length; i++) {
    const d = days[i], x = pad.left + gw * i + gw / 2 - bw / 2;
    let yOff = 0;
    for (const m of models) {
      const val = (d.tokensByModel || {})[m] || 0;
      if (val === 0) continue;
      const h = (val / maxVal) * ch;
      ctx.fillStyle = modelColor(m);
      ctx.fillRect(x, pad.top + ch - yOff - h, bw, h);
      yOff += h;
    }
    ctx.fillStyle = '#8b8fa3'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(d.date.slice(5), x + bw / 2, H - pad.bottom + 16);
  }

  // Legend
  document.getElementById('tokenLegend').innerHTML = models.map(m =>
    `<div class="legend-item"><div class="legend-dot" style="background:${modelColor(m)}"></div> ${esc(shortModel(m))}</div>`
  ).join('');
}

// ── Heatmap ──
function renderHeatmap() {
  const days = statsData.dailyActivity || [];
  const dayMap = {}; for (const d of days) dayMap[d.date] = d;
  const today = new Date();
  const cells = [];
  const startDay = new Date(today);
  startDay.setDate(startDay.getDate() - 16 * 7 + (7 - startDay.getDay()));
  for (let i = 0; i < 16 * 7; i++) {
    const d = new Date(startDay); d.setDate(d.getDate() + i);
    const key = d.toISOString().slice(0, 10);
    const data = dayMap[key];
    cells.push({ date: key, msgs: data ? data.messageCount : 0, data });
  }
  const maxMsgs = Math.max(...cells.map(c => c.msgs), 1);
  let html = '';
  for (let w = 0; w < 16; w++) {
    html += '<div class="heatmap-col">';
    for (let d = 0; d < 7; d++) {
      const cell = cells[w * 7 + d];
      if (!cell) { html += '<div class="heatmap-cell"></div>'; continue; }
      const level = cell.msgs === 0 ? 0 : Math.min(Math.ceil((cell.msgs / maxMsgs) * 5), 5);
      html += `<div class="heatmap-cell heat-${level}"
        onmouseenter="showHeatTip(event,'${cell.date}',${cell.msgs},${cell.data?cell.data.sessionCount:0},${cell.data?cell.data.toolCallCount:0})"
        onmouseleave="hideHeatTip()"></div>`;
    }
    html += '</div>';
  }
  document.getElementById('heatmap').innerHTML = html;
}
function showHeatTip(e, date, msgs, sessions, tools) {
  const tip = document.getElementById('heatmapTooltip');
  tip.innerHTML = `<strong>${date}</strong><br>${msgs} msgs, ${sessions} sessions, ${tools} tools`;
  tip.style.display = 'block'; tip.style.left = (e.clientX + 12) + 'px'; tip.style.top = (e.clientY - 10) + 'px';
}
function hideHeatTip() { document.getElementById('heatmapTooltip').style.display = 'none'; }

// ── History ──
function renderHistory() {
  const search = (document.getElementById('historySearch').value || '').toLowerCase();
  let filtered = historyData;
  if (search) filtered = filtered.filter(h => (h.display || '').toLowerCase().includes(search));
  if (!filtered.length) { document.getElementById('historyTable').innerHTML = '<div class="empty-state"><div class="icon">&#128221;</div>No prompts found</div>'; return; }
  let html = `<table class="history-table"><thead><tr><th>Time</th><th>Prompt</th><th>Project</th></tr></thead><tbody>`;
  for (const h of filtered.slice(0, 200)) {
    const time = h.timestamp ? new Date(h.timestamp).toLocaleString() : '';
    const proj = h.project ? h.project.split(/[/\\]/).slice(-2).join('/') : '';
    html += `<tr><td><span class="time-tag">${esc(time)}</span></td><td><span class="prompt-text">${esc(h.display || '')}</span></td><td><span class="project-tag">${esc(proj)}</span></td></tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('historyTable').innerHTML = html;
}

// ── Projects ──
function renderProjects() {
  const pc = {};
  for (const h of historyData) { const p = h.project || 'unknown'; pc[p] = (pc[p] || 0) + 1; }
  const sorted = Object.entries(pc).sort((a, b) => b[1] - a[1]);
  const max = sorted.length > 0 ? sorted[0][1] : 1;
  let html = '';
  for (const [proj, count] of sorted) {
    const short = proj.split(/[/\\]/).slice(-2).join('/');
    html += `<div class="project-row"><div class="project-name" title="${esc(proj)}">${esc(short)}</div><div class="project-bar-wrap"><div class="project-bar" style="width:${(count/max)*100}%"></div></div><div class="project-count">${count} prompts</div></div>`;
  }
  document.getElementById('projectsContent').innerHTML = html || '<div class="empty-state">No project data</div>';
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('historyTab').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('projectsTab').style.display = tab === 'projects' ? 'block' : 'none';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
window.addEventListener('resize', () => { renderChart(); renderTokenChart(); });
init();
</script>
