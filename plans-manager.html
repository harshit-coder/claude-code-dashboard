<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plans &amp; Todos</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --green: #00b894;
    --red: #e74c3c;
    --orange: #f39c12;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
  }

  .header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
  }

  .header h1 .icon { margin-right: 8px; }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    padding: 10px 24px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.2s;
  }

  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: var(--surface2); }

  .card-title {
    font-weight: 600;
    font-size: 1rem;
  }

  .card-meta {
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .card-chevron {
    transition: transform 0.2s;
    color: var(--text-dim);
    font-size: 1.2rem;
  }

  .card.expanded .card-chevron { transform: rotate(90deg); }

  .card-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }

  .card.expanded .card-body { display: block; padding-top: 16px; }

  /* Markdown content styling */
  .md-content h1, .md-content h2, .md-content h3 {
    margin: 16px 0 8px;
    color: var(--text);
  }
  .md-content h1 { font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .md-content h2 { font-size: 1.1rem; }
  .md-content h3 { font-size: 1rem; color: var(--accent); }
  .md-content p { margin: 8px 0; color: var(--text); }
  .md-content ul, .md-content ol { margin: 8px 0 8px 24px; }
  .md-content li { margin: 4px 0; }
  .md-content code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  .md-content pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .md-content pre code { background: none; padding: 0; }
  .md-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    color: var(--text-dim);
    margin: 10px 0;
  }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* Todo items */
  .todo-group-title {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 12px;
    word-break: break-all;
  }

  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 8px;
  }

  .todo-status {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 2px;
  }

  .todo-status.completed { background: var(--green); color: #fff; }
  .todo-status.in_progress, .todo-status.in-progress { background: var(--orange); color: #fff; }
  .todo-status.pending, .todo-status.open, .todo-status.not_started { background: var(--border); color: var(--text-dim); }
  .todo-status.blocked, .todo-status.cancelled { background: var(--red); color: #fff; }

  .todo-content { flex: 1; }
  .todo-label { font-size: 0.95rem; }
  .todo-priority {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
  }

  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(231, 76, 60, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 16px 20px;
    border-radius: var(--radius);
    text-align: center;
  }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
    font-size: 1rem;
  }

  .badge {
    display: inline-block;
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 12px;
    margin-left: 8px;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 12px 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .stats-bar span { display: flex; align-items: center; gap: 6px; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
</style>
</head>
<body>
  <div class="header"><h1><span class="icon">&#128203;</span> Plans &amp; Todos</h1></div>
  <div class="nav-bar" id="mainNav"></div><script src="/nav.js"></script><script>renderNav('plans')</script>

  <div class="tabs">
    <button class="tab active" data-tab="plans">Plans</button>
    <button class="tab" data-tab="todos">Todos</button>
  </div>

  <div class="container">
    <div id="plans-panel" class="panel active">
      <div class="loading"><div class="spinner"></div><div>Loading plans...</div></div>
    </div>
    <div id="todos-panel" class="panel">
      <div class="loading"><div class="spinner"></div><div>Loading todos...</div></div>
    </div>
  </div>

<script>
(function() {
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
    });
  });

  // Simple markdown renderer
  function renderMarkdown(md) {
    if (!md) return '';
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // Code blocks
      .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`)
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Headers
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // Bold & italic
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Links
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
      // Horizontal rule
      .replace(/^---$/gm, '<hr>')
      // Blockquote
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      // Unordered list items
      .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
      // Checkbox items
      .replace(/^- \[x\] (.+)$/gm, '<li>&#9745; $1</li>')
      .replace(/^- \[ \] (.+)$/gm, '<li>&#9744; $1</li>');

    // Wrap consecutive <li> in <ul>
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // Paragraphs for remaining lines
    html = html.replace(/^(?!<[hupblo]|<\/|<hr|<pre|<code|<ul|<li|<blockquote)(.+)$/gm, '<p>$1</p>');
    return html;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function formatDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
      ' ' + dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function statusIcon(status) {
    const s = (status || '').toLowerCase().replace(/\s+/g, '_');
    const icons = { completed: '&#10003;', in_progress: '&#9654;', pending: '&#9679;', open: '&#9679;', not_started: '&#9679;', blocked: '!', cancelled: '&#10005;' };
    const cls = s.replace(/_/g, '-');
    return `<div class="todo-status ${cls}">${icons[s] || '&#9679;'}</div>`;
  }

  function statusLabel(s) {
    return (s || 'pending').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function toggleCard(el) {
    el.closest('.card').classList.toggle('expanded');
  }

  // Fetch data
  fetch('http://localhost:3456/api/plans')
    .then(r => r.json())
    .then(data => {
      const plans = data.plans || [];
      const todos = data.todos || [];

      // Render plans
      const plansPanel = document.getElementById('plans-panel');
      if (plans.length === 0) {
        plansPanel.innerHTML = '<div class="empty-state">No plans found.</div>';
      } else {
        let html = '';
        plans.forEach((plan, i) => {
          const name = plan.name || plan.file.split(/[/\\]/).pop();
          html += `<div class="card" id="plan-${i}">
            <div class="card-header" onclick="this.closest('.card').classList.toggle('expanded')">
              <div>
                <span class="card-title">${escHtml(name)}</span>
              </div>
              <div class="card-meta">
                <span>${formatSize(plan.size || 0)}</span>
                <span>${formatDate(plan.modified)}</span>
                <span class="card-chevron">&#9654;</span>
              </div>
            </div>
            <div class="card-body">
              <div class="md-content">${renderMarkdown(plan.content)}</div>
            </div>
          </div>`;
        });
        plansPanel.innerHTML = html;
      }

      // Update tab label
      document.querySelector('[data-tab="plans"]').innerHTML = `Plans <span class="badge">${plans.length}</span>`;

      // Render todos
      const todosPanel = document.getElementById('todos-panel');
      if (todos.length === 0) {
        todosPanel.innerHTML = '<div class="empty-state">No todos found.</div>';
      } else {
        let totalItems = 0;
        let completed = 0;
        let inProgress = 0;

        todos.forEach(t => {
          (t.items || []).forEach(item => {
            totalItems++;
            const s = (item.status || '').toLowerCase().replace(/\s+/g, '_');
            if (s === 'completed') completed++;
            if (s === 'in_progress') inProgress++;
          });
        });

        let html = `<div class="stats-bar">
          <span><span class="dot" style="background:var(--text-dim)"></span> ${totalItems} Total</span>
          <span><span class="dot" style="background:var(--green)"></span> ${completed} Completed</span>
          <span><span class="dot" style="background:var(--orange)"></span> ${inProgress} In Progress</span>
          <span><span class="dot" style="background:var(--border)"></span> ${totalItems - completed - inProgress} Pending</span>
        </div>`;

        todos.forEach((group, gi) => {
          const fname = (group.file || '').split(/[/\\]/).pop() || 'Unknown';
          const items = group.items || [];
          html += `<div class="card" id="todo-${gi}">
            <div class="card-header" onclick="this.closest('.card').classList.toggle('expanded')">
              <div>
                <span class="card-title">${escHtml(fname)}</span>
                <span class="badge">${items.length} items</span>
              </div>
              <div class="card-meta">
                <span class="card-chevron">&#9654;</span>
              </div>
            </div>
            <div class="card-body">
              <div class="todo-group-title">${escHtml(group.file || '')}</div>
              ${items.map(item => {
                const label = item.content || item.title || item.description || item.label || JSON.stringify(item);
                const status = item.status || 'pending';
                const priority = item.priority ? `Priority: ${item.priority}` : '';
                return `<div class="todo-item">
                  ${statusIcon(status)}
                  <div class="todo-content">
                    <div class="todo-label">${escHtml(label)}</div>
                    <div class="todo-priority">${statusLabel(status)}${priority ? ' &middot; ' + escHtml(priority) : ''}</div>
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
        });
        todosPanel.innerHTML = html;
      }

      document.querySelector('[data-tab="todos"]').innerHTML = `Todos <span class="badge">${todos.length}</span>`;
    })
    .catch(err => {
      const msg = `<div class="error-msg">Failed to load data: ${escHtml(err.message)}</div>`;
      document.getElementById('plans-panel').innerHTML = msg;
      document.getElementById('todos-panel').innerHTML = msg;
    });

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
