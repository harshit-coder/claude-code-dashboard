<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paste History - Claude Code Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232735;
  --border: #2e3345;
  --text: #e1e4ed;
  --text-dim: #8b8fa3;
  --accent: #6c5ce7;
  --green: #00b894;
  --red: #e74c3c;
  --orange: #f39c12;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  padding: 24px 32px 0;
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
}

.header .icon {
  margin-right: 8px;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 32px;
}

/* Summary cards */
.summary-bar {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 22px;
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}

.stat-card .stat-icon {
  font-size: 1.5rem;
}

.stat-card .stat-value {
  font-size: 1.5rem;
  font-weight: 700;
}

.stat-card .stat-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Search */
.search-box {
  width: 100%;
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}

.search-box:focus {
  border-color: var(--accent);
}

.search-box::placeholder {
  color: var(--text-dim);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 10px 16px;
  background: transparent;
  border: none;
  border-radius: 7px;
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

.tab-btn:hover:not(.active) {
  color: var(--text);
  background: var(--surface2);
}

/* Tab content */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* Paste cards */
.paste-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.paste-card:hover {
  border-color: var(--accent);
}

.paste-header {
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}

.paste-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.paste-name {
  font-weight: 600;
  font-size: 0.95rem;
}

.paste-info {
  font-size: 0.78rem;
  color: var(--text-dim);
  display: flex;
  gap: 12px;
}

.paste-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.copy-btn {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}

.copy-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.copy-btn.copied {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.expand-icon {
  color: var(--text-dim);
  font-size: 0.8rem;
  transition: transform 0.2s;
}

.paste-card.expanded .expand-icon {
  transform: rotate(180deg);
}

.paste-preview {
  padding: 0 18px 14px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.82rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  line-height: 1.5;
  max-height: 4.5em;
  overflow: hidden;
}

.paste-full {
  display: none;
  padding: 0 18px 16px;
}

.paste-card.expanded .paste-full {
  display: block;
}

.paste-card.expanded .paste-preview {
  display: none;
}

.paste-content-full {
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.82rem;
  white-space: pre-wrap;
  line-height: 1.5;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  max-height: 400px;
  overflow: auto;
  word-break: break-word;
}

/* Prompt display for history pastes */
.paste-prompt {
  padding: 0 18px 10px;
  font-size: 0.82rem;
  color: var(--text-dim);
}

.paste-prompt strong {
  color: var(--accent);
  font-weight: 600;
}

.prompt-text {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 6px;
  font-style: italic;
  line-height: 1.4;
}

/* Loading & error */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.error-msg {
  background: rgba(231,76,60,0.1);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 16px 20px;
  color: var(--red);
  text-align: center;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="nav-bar" id="mainNav"></div>
<script src="/nav.js"></script>
<script>renderNav('pastes')</script>

<div class="header">
  <h1><span class="icon">&#128203;</span> Paste History</h1>
</div>

<div class="container">
  <div class="summary-bar">
    <div class="stat-card">
      <div>
        <div class="stat-value" id="cacheCount">-</div>
        <div class="stat-label">Paste Cache Files</div>
      </div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-value" id="historyCount">-</div>
        <div class="stat-label">From Conversations</div>
      </div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-value" id="totalCount">-</div>
        <div class="stat-label">Total Pastes</div>
      </div>
    </div>
  </div>

  <input type="text" class="search-box" id="searchInput" placeholder="Search across all paste content...">

  <div class="tabs">
    <button class="tab-btn active" data-tab="cache">Paste Cache</button>
    <button class="tab-btn" data-tab="history">From Conversations</button>
  </div>

  <div class="tab-content active" id="tab-cache">
    <div class="loading" id="loadingCache">
      <div class="spinner"></div>
      Loading paste cache...
    </div>
    <div id="cacheList"></div>
  </div>

  <div class="tab-content" id="tab-history">
    <div class="loading" id="loadingHistory">
      <div class="spinner"></div>
      Loading conversation pastes...
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
let allData = { pastes: [], historyPastes: [] };

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderPastes(allData.pastes, q);
  renderHistory(allData.historyPastes, q);
});

// Copy to clipboard
function copyContent(content, btn) {
  navigator.clipboard.writeText(content).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  });
}

// Toggle expand
function toggleCard(card) {
  card.classList.toggle('expanded');
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString() + ' ' + dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getPreviewLines(text, n) {
  if (!text) return '';
  return text.split('\n').slice(0, n).join('\n');
}

function renderPastes(pastes, query) {
  const container = document.getElementById('cacheList');
  let filtered = pastes;
  if (query) {
    filtered = pastes.filter(p =>
      (p.content || '').toLowerCase().includes(query) ||
      (p.file || '').toLowerCase().includes(query) ||
      (p.preview || '').toLowerCase().includes(query)
    );
  }
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No paste cache files found' + (query ? ' matching your search' : '') + '.</div>';
    return;
  }
  container.innerHTML = filtered.map((p, i) => `
    <div class="paste-card" id="cache-${i}">
      <div class="paste-header" onclick="toggleCard(document.getElementById('cache-${i}'))">
        <div class="paste-meta">
          <div class="paste-name">${escapeHtml(p.file || 'Unknown file')}</div>
          <div class="paste-info">
            <span>${formatDate(p.modified)}</span>
            <span>${formatSize(p.size || 0)}</span>
          </div>
        </div>
        <div class="paste-actions">
          <button class="copy-btn" onclick="event.stopPropagation(); copyContent(allData.pastes[${i}].content || allData.pastes[${i}].preview || '', this)">Copy</button>
          <span class="expand-icon">&#9660;</span>
        </div>
      </div>
      <div class="paste-preview">${escapeHtml(getPreviewLines(p.preview || p.content || '', 3))}</div>
      <div class="paste-full">
        <div class="paste-content-full">${escapeHtml(p.content || p.preview || '')}</div>
      </div>
    </div>
  `).join('');
}

function renderHistory(pastes, query) {
  const container = document.getElementById('historyList');
  let filtered = pastes;
  if (query) {
    filtered = pastes.filter(p =>
      (p.content || '').toLowerCase().includes(query) ||
      (p.prompt || '').toLowerCase().includes(query) ||
      (p.preview || '').toLowerCase().includes(query) ||
      (p.key || '').toLowerCase().includes(query)
    );
  }
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No conversation pastes found' + (query ? ' matching your search' : '') + '.</div>';
    return;
  }
  container.innerHTML = filtered.map((p, i) => `
    <div class="paste-card" id="hist-${i}">
      <div class="paste-header" onclick="toggleCard(document.getElementById('hist-${i}'))">
        <div class="paste-meta">
          <div class="paste-name">${escapeHtml(p.key || 'Paste')}</div>
          <div class="paste-info">
            <span>${formatDate(p.timestamp)}</span>
          </div>
        </div>
        <div class="paste-actions">
          <button class="copy-btn" onclick="event.stopPropagation(); copyContent(allData.historyPastes[${i}].content || allData.historyPastes[${i}].preview || '', this)">Copy</button>
          <span class="expand-icon">&#9660;</span>
        </div>
      </div>
      ${p.prompt ? `<div class="paste-prompt"><strong>Prompt:</strong><div class="prompt-text">${escapeHtml(p.prompt)}</div></div>` : ''}
      <div class="paste-preview">${escapeHtml(getPreviewLines(p.preview || p.content || '', 3))}</div>
      <div class="paste-full">
        <div class="paste-content-full">${escapeHtml(p.content || p.preview || '')}</div>
      </div>
    </div>
  `).join('');
}

async function loadData() {
  try {
    const resp = await fetch('http://localhost:3456/api/paste-history');
    if (!resp.ok) throw new Error('API returned ' + resp.status);
    const data = await resp.json();
    allData = data;

    document.getElementById('cacheCount').textContent = (data.pastes || []).length;
    document.getElementById('historyCount').textContent = (data.historyPastes || []).length;
    document.getElementById('totalCount').textContent = data.total || ((data.pastes || []).length + (data.historyPastes || []).length);

    document.getElementById('loadingCache').style.display = 'none';
    document.getElementById('loadingHistory').style.display = 'none';

    renderPastes(data.pastes || [], '');
    renderHistory(data.historyPastes || [], '');
  } catch (err) {
    document.getElementById('loadingCache').innerHTML = '<div class="error-msg">Failed to load paste history: ' + escapeHtml(err.message) + '</div>';
    document.getElementById('loadingHistory').innerHTML = '';
  }
}

loadData();
</script>
</body>
</html>
